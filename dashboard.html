<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartClassroom - Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }

    .navbar {
      background: #1e293b;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
    }
    .navbar h1 { font-size: 18px; }
    .logout-btn {
      background: #ef4444;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
    }

    .welcome {
      text-align: center;
      padding: 32px 24px 8px;
      font-size: 16px;
      color: #94a3b8;
    }
    .welcome span { color: #6366f1; font-weight: 700; }

    .menu {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 24px;
      max-width: 600px;
      margin: 0 auto;
    }
    .menu-card {
      background: #1e293b;
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
      text-decoration: none;
    }
    .menu-card:hover {
      border-color: #6366f1;
      transform: translateY(-4px);
    }
    .menu-card .icon { font-size: 40px; margin-bottom: 12px; }
    .menu-card h2 { color: #e2e8f0; font-size: 15px; font-weight: 700; }
    .menu-card p  { color: #64748b; font-size: 12px; margin-top: 4px; }
  </style>
</head>
<body>

  <div class="navbar">
    <h1>🎓 SmartClassroom</h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <span id="username-show" style="color:#64748b; font-size:13px;"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="welcome">
    <p>Welcome, <span id="welcome-name"></span>! 👋</p>
  </div>

  <div class="menu">
    <a class="menu-card" href="timetable.html">
      <div class="icon">📅</div>
      <h2>Timetable</h2>
      <p>View & manage schedule</p>
    </a>
    <a class="menu-card" href="subjects.html">
      <div class="icon">📚</div>
      <h2>Subjects</h2>
      <p>Manage subjects</p>
    </a>
    <a class="menu-card" href="rooms.html">
      <div class="icon">🏫</div>
      <h2>Rooms</h2>
      <p>Classroom details</p>
    </a>
    <a class="menu-card" href="announcements.html">
      <div class="icon">📢</div>
      <h2>Announcements</h2>
      <p>Latest updates</p>
    </a>
  </div>

  <script>
    const user = sessionStorage.getItem('user');
    if (!user) {
      window.location.href = 'index.html';
    }
    document.getElementById('username-show').textContent = user;
    document.getElementById('welcome-name').textContent = user;

    function logout() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }
  </script>

</body>
</html>
